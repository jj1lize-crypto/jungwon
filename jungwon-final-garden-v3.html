<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JungWon — 정원 · Today's Garden</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&family=DM+Mono:wght@300;400&display=swap');

  :root {
    --ink: #0e0c09;
    --paper: #f5f0e8;
    --moss: #5c6b3a;
    --clay: #c4845a;
    --mist: #9aab9e;
    --grey: #8a9a8e;
    --trace: #d4c9b0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    background: var(--ink);
    overflow: hidden;
    font-family: 'DM Mono', monospace;
  }

  /* Grain */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 100;
    opacity: 0.5;
  }

  /* Atmospheric bg */
  .bg-glow {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  /* Stage */
  .stage {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1;
  }

  #gardenSvg {
    width: min(880px, 96vw);
    height: min(880px, 96vh);
  }

  /* Header */
  .header {
    position: fixed;
    top: 28px;
    left: 36px;
    z-index: 20;
    opacity: 0;
    animation: fadeUp 1s ease 0.3s forwards;
  }

  .header-title {
    font-family: 'Nanum Myeongjo', serif;
    font-size: clamp(14px, 1.8vw, 20px);
    font-weight: 400;
    color: var(--paper);
    opacity: 0.55;
  }

  .header-sub {
    font-size: 8px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #4a4038;
    margin-top: 5px;
  }

  /* Person labels */
  .plabel {
    position: fixed;
    z-index: 20;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards;
  }

  .plabel .pname {
    font-family: 'Nanum Myeongjo', serif;
    font-size: 12px;
    display: block;
    margin-bottom: 3px;
  }

  .plabel .pcards {
    font-size: 7px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    opacity: 0.5;
    line-height: 1.9;
    display: block;
  }

  .pl1 { top: 28px; right: 36px; text-align: right; color: var(--moss); animation-delay: 1s; }
  .pl2 { bottom: 70px; right: 36px; text-align: right; color: var(--clay); animation-delay: 1.2s; }
  .pl3 { bottom: 70px; left: 36px; color: var(--mist); animation-delay: 1.4s; }
  .pl4 { top: 80px; left: 36px; color: var(--grey); animation-delay: 1.6s; }

  /* Bottom note */
  .bottom-note {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 8px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #3a3028;
    z-index: 20;
    opacity: 0;
    animation: fadeUp 0.8s ease 2s forwards;
    white-space: nowrap;
  }

  /* ── FLOATING TRACES ── */
  .trace-container {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 10;
  }

  .trace {
    position: absolute;
    opacity: 0;
  }

  /* Organic bubble base */
  .trace-bubble {
    position: relative;
    padding: 14px 18px;
    border-radius: 62% 38% 54% 46% / 48% 52% 48% 52%;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }

  /* Text trace */
  .trace-text {
    font-family: 'Nanum Myeongjo', serif;
    font-size: clamp(10px, 1.3vw, 13px);
    line-height: 1.85;
    max-width: 200px;
  }

  /* Wave trace */
  .trace-wave-inner {
    padding: 12px 16px;
  }

  /* Photo trace */
  .trace-photo-inner {
    overflow: hidden;
    border-radius: 58% 42% 52% 48% / 46% 54% 46% 54%;
  }

  .trace-photo-inner img {
    width: clamp(90px, 12vw, 148px);
    aspect-ratio: 4/3;
    object-fit: cover;
    display: block;
    mix-blend-mode: luminosity;
    opacity: 0.8;
  }

  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes growIn {
    from { opacity: 0; transform: scale(0.94); }
    to { opacity: 1; transform: scale(1); }
  }

  @keyframes traceAppear {
    0% { opacity: 0; transform: scale(0.88) translateY(8px); }
    14% { opacity: 1; transform: scale(1) translateY(0); }
    78% { opacity: 1; transform: scale(1) translateY(0); }
    100% { opacity: 0; transform: scale(0.94) translateY(-5px); }
  }

  @keyframes traceFloat {
    0% { opacity: 0; transform: scale(0.9); }
    12% { opacity: 1; transform: scale(1); }
    82% { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(0.96); }
  }

  @keyframes waveDraw {
    0% { opacity: 0; transform: scale(0.9); }
    10% { opacity: 1; transform: scale(1); }
    82% { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(0.95); }
  }
</style>
</head>

      <circle cx="708" cy="738" r="11" fill="none" stroke="#8a9a8e" stroke-width="0.5" opacity="0.22"/>
    </g>

    <!-- ── FLOATING SPORES ── -->
    <g style="animation: growIn 2s ease 1.8s both" opacity="0.35">
      <circle cx="195" cy="440" r="1.4" fill="#5c6b3a"/>
      <circle cx="515" cy="175" r="1" fill="#9aab9e"/>
      <circle cx="745" cy="415" r="1.4" fill="#c4845a"/>
      <circle cx="158" cy="592" r="1" fill="#5c6b3a"/>
      <circle cx="672" cy="198" r="1.4" fill="#8a9a8e"/>
      <circle cx="375" cy="158" r="1" fill="#9aab9e"/>
      <circle cx="815" cy="542" r="1" fill="#c4845a"/>
      <circle cx="96" cy="345" r="1.4" fill="#5c6b3a"/>
      <circle cx="552" cy="792" r="1" fill="#9aab9e"/>
      <circle cx="792" cy="692" r="1.4" fill="#8a9a8e"/>
      <circle cx="248" cy="220" r="1" fill="#5c6b3a"/>
      <circle cx="832" cy="310" r="1" fill="#c4845a"/>
    </g>

  </svg>
</div>

<!-- Floating traces container -->
<div class="trace-container" id="traceContainer"></div>

<!-- Bottom note -->
<div class="bottom-note" id="bottomNote"></div>

<script>
  // Date
  const now = new Date();
  const formatted = now.toLocaleDateString('en-GB',{day:'2-digit',month:'long',year:'numeric'}).toUpperCase();
  document.getElementById('todayDate').textContent = formatted;
  document.getElementById('bottomNote').textContent = `Today's garden · 4 seeds planted · ${formatted}`;

  // ── TRACE DATA ──
  const traces = [
    // Text traces
    {
      type: 'text',
      color: '#5c6b3a',
      content: '엄마 김치 레시피 드디어 배웠다',
      person: 'Jiwon',
      positions: [
        { left: '8%', top: '28%' },
        { left: '12%', top: '52%' },
        { left: '6%', top: '42%' }
      ]
    },
    {
      type: 'text',
      color: '#c4845a',
      content: '허리가 1년 반 동안 아팠는데 말을 못했어.',
      person: 'Father',
      positions: [
        { left: '68%', top: '35%' },
        { left: '72%', top: '55%' },
        { left: '65%', top: '45%' }
      ]
    },
    {
      type: 'text',
      color: '#9aab9e',
      content: '같이 만든 여름 김치.\n우리 집 맛이 맞아.',
      person: 'Mother',
      positions: [
        { left: '42%', top: '18%' },
        { left: '38%', top: '72%' },
        { left: '44%', top: '62%' }
      ]
    },
    {
      type: 'text',
      color: '#8a9a8e',
      content: '이상하면 먼저 물어봐.',
      person: 'Brother',
      positions: [
        { left: '74%', top: '22%' },
        { left: '76%', top: '68%' }
      ]
    },
    {
      type: 'text',
      color: '#5c6b3a',
      content: '아빠 방 청소하다가\n귀이개 버릴 뻔 했어.',
      person: 'Jiwon',
      positions: [
        { left: '4%', top: '62%' },
        { left: '10%', top: '35%' }
      ]
    },
    // Waveform traces — audio
    {
      type: 'wave',
      color: '#c4845a',
      label: 'Father · 0:32',
      positions: [
        { left: '58%', top: '25%' },
        { left: '62%', top: '62%' }
      ]
    },
    {
      type: 'wave',
      color: '#9aab9e',
      label: 'Mother · 1:04',
      positions: [
        { left: '32%', top: '78%' },
        { left: '44%', top: '14%' }
      ]
    },
    {
      type: 'wave',
      color: '#5c6b3a',
      label: 'Jiwon · 0:18',
      positions: [
        { left: '14%', top: '18%' },
        { left: '8%', top: '68%' }
      ]
    },
    // Photo placeholders
    {
      type: 'photo',
      color: '#9aab9e',
      label: '김치 making · Mother',
      bg: 'linear-gradient(135deg, #2a3a2e 0%, #1a2a1e 100%)',
      positions: [
        { left: '34%', top: '8%' },
        { left: '28%', top: '68%' }
      ]
    },
    {
      type: 'photo',
      color: '#5c6b3a',
      label: 'Dad\'s shelf · Jiwon',
      bg: 'linear-gradient(135deg, #1e2a14 0%, #141e0e 100%)',
      positions: [
        { left: '6%', top: '14%' },
        { left: '14%', top: '76%' }
      ]
    },
    {
      type: 'photo',
      color: '#c4845a',
      label: 'Hospital visit · Father',
      bg: 'linear-gradient(135deg, #2a1e10 0%, #1e160a 100%)',
      positions: [
        { left: '65%', top: '14%' },
        { left: '70%', top: '72%' }
      ]
    }
  ];

  // Organic bubble border-radius variants — slightly different each time
  const bubbleShapes = [
    '62% 38% 54% 46% / 48% 52% 48% 52%',
    '48% 52% 38% 62% / 54% 46% 54% 46%',
    '58% 42% 62% 38% / 42% 58% 46% 54%',
    '44% 56% 48% 52% / 60% 40% 56% 44%',
    '52% 48% 44% 56% / 38% 62% 50% 50%',
    '66% 34% 50% 50% / 50% 50% 44% 56%',
  ];

  function getBubbleShape() {
    return bubbleShapes[Math.floor(Math.random() * bubbleShapes.length)];
  }

  // Generate waveform SVG
  function makeWave(color, label, width=160) {
    const h = 36;
    const pts = Array.from({length:55}, (_,i) => {
      const x = (i/54)*width;
      const amp = (Math.sin(i*0.4)*0.5 + Math.sin(i*0.85)*0.3 + Math.sin(i*1.7)*0.2) * (h/2-5);
      return `${x.toFixed(1)},${(h/2 + amp).toFixed(1)}`;
    }).join(' ');
    return `
      <div class="trace-wave-inner trace-bubble" style="
        background: ${color}18;
        border-radius: ${getBubbleShape()};
        border: 1px solid ${color}40;
      ">
        <svg width="${width}" height="${h}" viewBox="0 0 ${width} ${h}" xmlns="http://www.w3.org/2000/svg">
          <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.75"/>
        </svg>
        <div style="font-size:7px;letter-spacing:0.14em;text-transform:uppercase;color:${color};opacity:0.55;margin-top:5px">${label}</div>
      </div>
    `;
  }

  // Generate photo bubble
  function makePhoto(item) {
    return `
      <div class="trace-bubble" style="
        background: ${item.color}15;
        border-radius: ${getBubbleShape()};
        border: 1px solid ${item.color}35;
        padding: 10px;
        overflow: hidden;
      ">
        <div style="width:clamp(88px,11vw,140px);aspect-ratio:4/3;background:${item.bg};position:relative;border-radius:${getBubbleShape()};overflow:hidden;">
          <svg style="position:absolute;top:50%;left:50%;transform:translate(-50%,-55%)" width="32" height="32" viewBox="0 0 32 32" opacity="0.25">
            <line x1="16" y1="28" x2="16" y2="4" stroke="${item.color}" stroke-width="1.4"/>
            <path d="M 16 20 Q 6 15 5 8" fill="none" stroke="${item.color}" stroke-width="0.9"/>
            <path d="M 16 16 Q 26 11 27 4" fill="none" stroke="${item.color}" stroke-width="0.9"/>
            <circle cx="16" cy="4" r="2.5" fill="${item.color}" opacity="0.5"/>
          </svg>
        </div>
        <div style="font-size:6px;letter-spacing:0.13em;text-transform:uppercase;color:${item.color};opacity:0.5;margin-top:6px;padding:0 2px">${item.label}</div>
      </div>
    `;
  }

  // Create a trace element
  function createTrace(item, posIdx) {
    const pos = item.positions[posIdx % item.positions.length];
    const el = document.createElement('div');
    el.className = 'trace';
    el.style.left = pos.left;
    el.style.top = pos.top;

    if (item.type === 'text') {
      const shape = getBubbleShape();
      el.innerHTML = `
        <div class="trace-text trace-bubble" style="
          color: ${item.color};
          background: ${item.color}18;
          border-radius: ${shape};
          border: 1px solid ${item.color}40;
        ">${item.content.replace(/\n/g,'<br/>')}</div>
      `;
    } else if (item.type === 'wave') {
      el.innerHTML = makeWave(item.color, item.label);
    } else if (item.type === 'photo') {
      el.innerHTML = makePhoto(item);
    }

    return el;
  }

  // Animate traces in sequence
  const container = document.getElementById('traceContainer');
  let queue = [];

  // Build a shuffled queue
  traces.forEach((item, ti) => {
    item.positions.forEach((_, pi) => {
      queue.push({ traceIdx: ti, posIdx: pi });
    });
  });

  // Shuffle
  for (let i = queue.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [queue[i],queue[j]] = [queue[j],queue[i]];
  }

  let qIdx = 0;

  function showNextTrace() {
    if (queue.length === 0) return;
    const { traceIdx, posIdx } = queue[qIdx % queue.length];
    qIdx++;

    const item = traces[traceIdx];
    const el = createTrace(item, posIdx);
    container.appendChild(el);

    // Duration
    const dur = item.type === 'photo' ? 5000 : item.type === 'wave' ? 4500 : 6000;
    const anim = item.type === 'wave' ? 'waveDraw' : item.type === 'photo' ? 'traceFloat' : 'traceAppear';

    el.style.animation = `${anim} ${dur}ms ease forwards`;

    setTimeout(() => {
      if (el.parentNode) container.removeChild(el);
    }, dur + 100);
  }

  // Start after garden loads
  setTimeout(() => {
    showNextTrace();
    // Stagger subsequent traces
    let delay = 1200;
    for (let i = 1; i < queue.length * 2; i++) {
      const gap = 2500 + Math.random() * 3000;
      delay += gap;
      setTimeout(showNextTrace, delay);
    }
  }, 2200);

</script>
</body>
